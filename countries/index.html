<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countries</title>
    <link rel="stylesheet" href="../styles.css" />
    <script type="module" src="../src/countryHubPage.js"></script>
  </head>
  <body data-root-href="../" data-page-kind="country-hub">
    <header class="site-header">
      <a class="site-home-link" href="../">HOME</a>
    </header>
    <main class="page-shell">
      <section class="top-nav-card" aria-label="Site navigation">
        <a class="country-hub-nav-link" href="./" aria-current="page">Countries</a>
        <details class="top-nav-disclosure">
          <summary class="top-nav-label">Country Rankings</summary>
          <div class="top-nav-group">
            <details class="top-nav-disclosure">
              <summary class="top-nav-label">Economic</summary>
              <nav class="site-nav" id="rankingTopNav"></nav>
            </details>
            <details class="top-nav-disclosure">
              <summary class="top-nav-label">Population</summary>
              <nav class="site-nav" id="populationTopNav"></nav>
            </details>
            <details class="top-nav-disclosure">
              <summary class="top-nav-label">Environmental</summary>
              <nav class="site-nav" id="environmentalTopNav"></nav>
            </details>
            <details class="top-nav-disclosure">
              <summary class="top-nav-label">Trade</summary>
              <nav class="site-nav" id="tradeTopNav"></nav>
            </details>
            <details class="top-nav-disclosure">
              <summary class="top-nav-label">Fiscal</summary>
              <nav class="site-nav" id="fiscalTopNav"></nav>
            </details>
          </div>
        </details>
      </section>

      <section class="world-map-card" aria-labelledby="world-map-title">
        <header class="world-map-header">
          <h2 id="world-map-title">World Map</h2>
        </header>
        <div class="world-map" id="worldMap" aria-live="polite">
          <p class="world-map-loading">Loading map...</p>
        </div>
      </section>

      <section class="hub-section" aria-labelledby="country-hub-title">
        <header class="page-header">
          <h1 id="country-hub-title" class="page-title">Countries</h1>
        </header>

        <div class="country-search-panel country-hub-search-panel">
          <div class="search-input-wrap">
            <input
              id="countrySearchInput"
              class="country-search-input"
              type="search"
              autocomplete="off"
              placeholder="Search a country&hellip;"
              aria-controls="countrySearchResults"
              role="combobox"
              aria-autocomplete="list"
              aria-expanded="true"
            />
          </div>
          <div class="filter-panel-row">
            <details class="category-panel" aria-labelledby="region-heading">
              <summary class="category-heading" id="region-heading">Regions</summary>
            </details>
            <details class="category-panel" aria-labelledby="category-heading">
              <summary class="category-heading" id="category-heading">Categories</summary>
            </details>
          </div>
          <div class="category-list filter-option-list" id="regionList" hidden></div>
          <div class="category-list filter-option-list" id="categoryList" hidden></div>
          <p class="ranking-count country-hub-count" id="countryHubCount"></p>
          <div
            class="country-results country-hub-results"
            id="countrySearchResults"
            role="listbox"
            aria-label="Country profile links"
          ></div>
        </div>
      </section>
    </main>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countries</title>
    <link rel="stylesheet" href="../styles.css" />
    <script type="module" src="../src/countryHubPage.js"></script>
  </head>
  <body data-root-href="../" data-page-kind="country-hub">
    <header class="site-header">
      <a class="site-home-link" href="../">HOME</a>
    </header>
    <main class="page-shell">
      <section class="top-nav-card" aria-label="Site navigation"></section>

      <section class="hub-section" aria-label="Countries">
        <details class="country-hub-map-toggle" open>
          <summary class="country-hub-map-summary">
            <span class="country-hub-map-summary-label">
              <svg class="country-hub-map-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.75" />
                <path d="M3.5 12h17" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                <path d="M12 3c3.1 3.1 3.1 14.9 0 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                <path d="M12 3c-3.1 3.1-3.1 14.9 0 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                <path d="M5.5 7.5c2 1.1 4.1 1.7 6.5 1.7s4.5-.6 6.5-1.7" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" />
                <path d="M5.5 16.5c2-1.1 4.1-1.7 6.5-1.7s4.5.6 6.5 1.7" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" />
              </svg>
              <span>Show world map</span>
            </span>
          </summary>
          <div class="country-hub-map-content">
            <div class="world-map" id="worldMap" role="region" aria-label="World map" aria-live="polite">
              <p class="world-map-loading">Loading map...</p>
            </div>

            <p class="world-map-instruction">Tap any place to open its data page.</p>
          </div>
        </details>

        <div class="country-hub-panel">
          <div class="search-input-wrap">
            <input
              id="countrySearchInput"
              class="country-search-input"
              type="search"
              autocomplete="off"
              aria-controls="countrySearchResults"
              role="combobox"
              aria-autocomplete="list"
              aria-expanded="false"
            />
            <div class="country-results" id="countrySearchResults" role="listbox" aria-label="Country search results" hidden></div>
          </div>
          <p class="filter-label">Filter by:</p>
          <div class="filter-panel-row">
            <details class="category-panel" aria-labelledby="region-heading">
              <summary class="category-heading" id="region-heading">Regions</summary>
            </details>
            <details class="category-panel" aria-labelledby="category-heading">
              <summary class="category-heading" id="category-heading">Categories</summary>
            </details>
            <div class="country-hub-controls" id="countryHubControls"></div>
          </div>
          <div class="category-list filter-option-list" id="regionList" hidden></div>
          <div class="category-list filter-option-list" id="categoryList" hidden></div>
          <p class="entity-count" id="countryHubCount"></p>
          <table class="country-hub-table" aria-label="Countries and territories">
            <tbody id="countryTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>

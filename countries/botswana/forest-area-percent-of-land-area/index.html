<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Botswana Forest Area (% of Land Area)</title>
    <link rel="stylesheet" href="../../../styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
    <script type="module" src="../../../src/countryIndicatorPage.js"></script>
  </head>
  <body data-country-code="BWA" data-page-kind="forest-area-percent-of-land-area">
    <header class="site-header">
      <a class="site-home-link" href="../../../">HOME</a>
    </header>
    <main class="page-shell">
      <section class="top-nav-card" aria-label="Site navigation">
        <a class="country-hub-nav-link" href="../../../countries/">Countries</a>
        <a class="country-hub-nav-link" href="../../../rankings/">Rankings</a>
      </section>

      <section class="hub-section" aria-labelledby="country-hub-title">
        <header class="page-header">
          <h1 id="country-hub-title" class="page-title">Forest Area (% of Land Area) Chart by Country</h1>
          <p class="subtitle">Select a country to view historical environmental indicator trends.</p>
        </header>

        <div class="country-search-panel">
          <div class="search-input-wrap">
            <input
              id="countrySearchInput"
              class="country-search-input"
              type="search"
              autocomplete="off"
              placeholder="Search a country&hellip;"
              aria-controls="countrySearchResults"
              role="combobox"
              aria-autocomplete="list"
              aria-expanded="false"
            />
          </div>
          <div class="filter-panel-row">
            <details class="category-panel" aria-labelledby="region-heading">
              <summary class="category-heading" id="region-heading">Regions</summary>
            </details>
            <details class="category-panel" aria-labelledby="category-heading">
              <summary class="category-heading" id="category-heading">Categories</summary>
            </details>
          </div>
          <div class="category-list filter-option-list" id="regionList" hidden></div>
          <div class="category-list filter-option-list" id="categoryList" hidden></div>
          <div class="country-results" id="countrySearchResults" role="listbox" aria-label="Country search results" hidden></div>
        </div>
      </section>

      <section class="indicators-section" aria-labelledby="country-data-title">
        <div class="indicators-card">
          <header class="page-header country-data-header">
            <h1 id="country-data-title">Botswana</h1>
            <nav class="site-nav" id="countryRelatedPageNav" aria-label="Environmental page navigation"></nav>
          </header>

          <section class="indicator-block" aria-labelledby="forestAreaPercentOfLandArea-title">
            <header class="indicator-header">
              <div class="indicator-title-group">
                <h2 id="forestAreaPercentOfLandArea-title">Forest Area (% of Land Area)</h2>
              </div>
              <div class="compare-control" data-series-id="forestAreaPercentOfLandArea">
                <div class="compare-input-wrap">
                  <input
                    id="forestAreaPercentOfLandAreaCompareInput"
                    class="compare-search-input"
                    type="search"
                    autocomplete="off"
                    placeholder="Compare with..."
                    aria-controls="forestAreaPercentOfLandAreaCompareResults"
                    role="combobox"
                    aria-autocomplete="list"
                    aria-expanded="false"
                  />
                </div>
                <p class="compare-selected" id="forestAreaPercentOfLandAreaCompareSelected"></p>
                <div class="country-results compare-results" id="forestAreaPercentOfLandAreaCompareResults" role="listbox" aria-label="Forest Area (% of Land Area) comparison country results" hidden></div>
              </div>
            </header>

            <div class="chart-card" id="forestAreaPercentOfLandAreaChartCard">
              <canvas id="forestAreaPercentOfLandAreaChart" aria-label="Forest area percent of land area line chart" role="img"></canvas>
              <div class="chart-overlay" id="forestAreaPercentOfLandAreaOverlay" aria-hidden="true"></div>
            </div>

            <details class="data-table-toggle" id="forestAreaPercentOfLandAreaTableToggle">
              <summary>Show data table</summary>
              <div class="data-table-wrap" id="forestAreaPercentOfLandAreaTableWrap"></div>
            </details>
          </section>

          <footer class="shared-notes" aria-label="Chart notes">
            <p>Source: World Bank World Development Indicators.</p>
          </footer>
        </div>
      </section>
    </main>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>United States Current Account Balance</title>
    <link rel="stylesheet" href="../../../styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
    <script type="module" src="../../../src/countryIndicatorPage.js"></script>
  </head>
  <body data-country-code="USA" data-page-kind="current-account-balance">
    <header class="site-header">
      <a class="site-home-link" href="../../../">HOME</a>
    </header>
    <main class="page-shell">
      <section class="top-nav-card" aria-label="Site navigation"></section>

      <section class="hub-section" aria-labelledby="country-hub-title">
        <header class="page-header">
          <h1 id="country-hub-title" class="page-title">Current Account Balance Chart by Country</h1>
          <p class="subtitle">Select a country to view historical trends.</p>
        </header>

        <div class="country-search-panel">
          <div class="search-input-wrap">
            <input
              id="countrySearchInput"
              class="country-search-input"
              type="search"
              autocomplete="off"
              aria-controls="countrySearchResults"
              role="combobox"
              aria-autocomplete="list"
              aria-expanded="false"
            />
            <div class="country-results" id="countrySearchResults" role="listbox" aria-label="Country search results" hidden></div>
          </div>
        </div>
      </section>

      <section class="indicators-section" aria-labelledby="country-data-title">
        <div class="indicators-card">
          <header class="page-header country-data-header">
            <h1 id="country-data-title">United States</h1>
            <nav class="site-nav" id="countryRelatedPageNav" aria-label="Trade page navigation"></nav>
          </header>

          <section class="indicator-block" aria-labelledby="currentAccountBalance-title">
            <header class="indicator-header">
              <div class="indicator-title-group">
                <h2 id="currentAccountBalance-title">Current Account Balance <span class="indicator-display-unit">USD</span></h2>
              </div>
              <div class="compare-control" data-series-id="currentAccountBalance">
                <div class="compare-input-wrap">
                  <input
                    id="currentAccountBalanceCompareInput"
                    class="compare-search-input"
                    type="search"
                    autocomplete="off"
                    placeholder="Compare with..."
                    aria-controls="currentAccountBalanceCompareResults"
                    role="combobox"
                    aria-autocomplete="list"
                    aria-expanded="false"
                  />
                </div>
                <p class="compare-selected" id="currentAccountBalanceCompareSelected"></p>
                <div class="country-results compare-results" id="currentAccountBalanceCompareResults" role="listbox" aria-label="Current Account Balance comparison country results" hidden></div>
              </div>
            </header>

            <div class="chart-card" id="currentAccountBalanceChartCard">
              <canvas id="currentAccountBalanceChart" aria-label="Current account balance line chart" role="img"></canvas>
              <div class="chart-overlay" id="currentAccountBalanceOverlay" aria-hidden="true"></div>
            </div>

            <details class="data-table-toggle" id="currentAccountBalanceTableToggle">
              <summary>Show data table</summary>
              <div class="data-table-wrap" id="currentAccountBalanceTableWrap"></div>
            </details>
          </section>

          <section class="indicator-block" aria-labelledby="currentAccountBalancePercentGdp-title">
            <header class="indicator-header">
              <div class="indicator-title-group">
                <h2 id="currentAccountBalancePercentGdp-title">Current Account Balance <span class="indicator-display-unit">% of GDP</span></h2>
              </div>
              <div class="compare-control" data-series-id="currentAccountBalancePercentGdp">
                <div class="compare-input-wrap">
                  <input
                    id="currentAccountBalancePercentGdpCompareInput"
                    class="compare-search-input"
                    type="search"
                    autocomplete="off"
                    placeholder="Compare with..."
                    aria-controls="currentAccountBalancePercentGdpCompareResults"
                    role="combobox"
                    aria-autocomplete="list"
                    aria-expanded="false"
                  />
                </div>
                <p class="compare-selected" id="currentAccountBalancePercentGdpCompareSelected"></p>
                <div class="country-results compare-results" id="currentAccountBalancePercentGdpCompareResults" role="listbox" aria-label="Current Account Balance (% of GDP) comparison country results" hidden></div>
              </div>
            </header>

            <div class="chart-card" id="currentAccountBalancePercentGdpChartCard">
              <canvas id="currentAccountBalancePercentGdpChart" aria-label="Current account balance percent of GDP line chart" role="img"></canvas>
              <div class="chart-overlay" id="currentAccountBalancePercentGdpOverlay" aria-hidden="true"></div>
            </div>

            <details class="data-table-toggle" id="currentAccountBalancePercentGdpTableToggle">
              <summary>Show data table</summary>
              <div class="data-table-wrap" id="currentAccountBalancePercentGdpTableWrap"></div>
            </details>
          </section>

          <footer class="shared-notes" aria-label="Chart notes">
            <p>Source: IMF World Economic Outlook.</p>
            <p>Data may include IMF estimates and projections.</p>
          </footer>
        </div>
      </section>
    </main>
  </body>
</html>

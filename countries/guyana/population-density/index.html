<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guyana Population Density</title>
    <link rel="stylesheet" href="../../../styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
    <script type="module" src="../../../src/countryIndicatorPage.js"></script>
  </head>
  <body data-country-code="GUY" data-page-kind="population-density">
    <header class="site-header">
      <a class="site-home-link" href="../../../">HOME</a>
    </header>
    <main class="page-shell">
      <section class="top-nav-card" aria-label="Site navigation"></section>

      <section class="hub-section" aria-labelledby="country-hub-title">
        <header class="page-header">
          <h1 id="country-hub-title" class="page-title">Population Density Chart by Country</h1>
        </header>

        <div class="country-search-panel">
          <div class="search-input-wrap">
            <input
              id="countrySearchInput"
              class="country-search-input"
              type="search"
              autocomplete="off"
              aria-controls="countrySearchResults"
              role="combobox"
              aria-autocomplete="list"
              aria-expanded="false"
            />
            <div class="country-results" id="countrySearchResults" role="listbox" aria-label="Country search results" hidden></div>
          </div>
        </div>
      </section>

      <section class="indicators-section" aria-labelledby="country-data-title">
        <div class="indicators-card">
          <header class="page-header country-data-header">
            <h1 id="country-data-title">Guyana</h1>
            <nav class="site-nav" id="countryRelatedPageNav" aria-label="Population page navigation"></nav>
          </header>

          <section class="indicator-block" aria-labelledby="populationDensity-title">
            <header class="indicator-header">
              <div class="indicator-title-group">
                <h2 id="populationDensity-title">Population Density <span class="indicator-display-unit">(/km²)</span> <button class="indicator-info-button" type="button" data-indicator-info-series-id="populationDensity" aria-label="Population Density information">i</button></h2>
              </div>
              <div class="compare-control" data-series-id="populationDensity">
                <div class="compare-input-wrap">
                  <input
                    id="populationDensityCompareInput"
                    class="compare-search-input"
                    type="search"
                    autocomplete="off"
                    placeholder="Compare with..."
                    aria-controls="populationDensityCompareResults"
                    role="combobox"
                    aria-autocomplete="list"
                    aria-expanded="false"
                  />
                </div>
                <p class="compare-selected" id="populationDensityCompareSelected"></p>
                <div class="country-results compare-results" id="populationDensityCompareResults" role="listbox" aria-label="Population Density comparison country results" hidden></div>
              </div>
            </header>

            <div class="chart-card" id="populationDensityChartCard">
              <canvas id="populationDensityChart" aria-label="Population density line chart" role="img"></canvas>
              <div class="chart-overlay" id="populationDensityOverlay" aria-hidden="true"></div>
            </div>

            <details class="data-table-toggle" id="populationDensityTableToggle">
              <summary>Show data table</summary>
              <div class="data-table-wrap" id="populationDensityTableWrap"></div>
            </details>
          </section>

          <footer class="shared-notes" aria-label="Data notes">
            <p>Source: World Bank World Development Indicators.</p>
          </footer>
        </div>
      </section>
    </main>
  </body>
</html>

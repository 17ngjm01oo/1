<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Caledonia Military Spending</title>
    <link rel="stylesheet" href="../../../styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
    <script type="module" src="../../../src/countryIndicatorPage.js"></script>
  </head>
  <body data-country-code="NCL" data-page-kind="military-spending">
    <header class="site-header">
      <a class="site-home-link" href="../../../">HOME</a>
    </header>
    <main class="page-shell">
      <section class="top-nav-card" aria-label="Site navigation"></section>

      <section class="hub-section" aria-labelledby="country-hub-title">
        <header class="page-header">
          <h1 id="country-hub-title" class="page-title">Military Spending Chart by Country</h1>
        </header>

        <div class="country-search-panel">
          <div class="search-input-wrap">
            <input
              id="countrySearchInput"
              class="country-search-input"
              type="search"
              autocomplete="off"
              aria-controls="countrySearchResults"
              role="combobox"
              aria-autocomplete="list"
              aria-expanded="false"
            />
            <div class="country-results" id="countrySearchResults" role="listbox" aria-label="Country search results" hidden></div>
          </div>
        </div>
      </section>

      <section class="indicators-section" aria-labelledby="country-data-title">
        <div class="indicators-card">
          <header class="page-header country-data-header">
            <h1 id="country-data-title">New Caledonia</h1>
            <nav class="site-nav" id="countryRelatedPageNav" aria-label="Society page navigation"></nav>
          </header>

          <section class="indicator-block" aria-labelledby="militarySpending-title">
            <header class="indicator-header">
              <div class="indicator-title-group">
                <h2 id="militarySpending-title">Military Spending <span class="indicator-display-unit">(USD)</span> <button class="indicator-info-button" type="button" data-indicator-info-series-id="militarySpending" data-indicator-info-tooltip-placement="country-indicator" aria-label="Military Spending information">i</button></h2>
              </div>
              <div class="compare-control" data-series-id="militarySpending">
                <div class="compare-input-wrap">
                  <input
                    id="militarySpendingCompareInput"
                    class="compare-search-input"
                    type="search"
                    autocomplete="off"
                    placeholder="Compare with..."
                    aria-controls="militarySpendingCompareResults"
                    role="combobox"
                    aria-autocomplete="list"
                    aria-expanded="false"
                  />
                </div>
                <p class="compare-selected" id="militarySpendingCompareSelected"></p>
                <div class="country-results compare-results" id="militarySpendingCompareResults" role="listbox" aria-label="Military Spending comparison country results" hidden></div>
              </div>
            </header>

            <div class="chart-card" id="militarySpendingChartCard">
              <canvas id="militarySpendingChart" aria-label="Military spending line chart" role="img"></canvas>
              <div class="chart-overlay" id="militarySpendingOverlay" aria-hidden="true"></div>
            </div>

            <details class="data-table-toggle" id="militarySpendingTableToggle">
              <summary>Show data table</summary>
              <div class="data-table-wrap" id="militarySpendingTableWrap"></div>
            </details>
          </section>

          <section class="indicator-block" aria-labelledby="militarySpendingPercentGdp-title">
            <header class="indicator-header">
              <div class="indicator-title-group">
                <h2 id="militarySpendingPercentGdp-title">Military Spending <span class="indicator-display-unit">(% of GDP)</span> <button class="indicator-info-button" type="button" data-indicator-info-series-id="militarySpendingPercentGdp" data-indicator-info-tooltip-placement="country-indicator" aria-label="Military Spending information">i</button></h2>
              </div>
              <div class="compare-control" data-series-id="militarySpendingPercentGdp">
                <div class="compare-input-wrap">
                  <input
                    id="militarySpendingPercentGdpCompareInput"
                    class="compare-search-input"
                    type="search"
                    autocomplete="off"
                    placeholder="Compare with..."
                    aria-controls="militarySpendingPercentGdpCompareResults"
                    role="combobox"
                    aria-autocomplete="list"
                    aria-expanded="false"
                  />
                </div>
                <p class="compare-selected" id="militarySpendingPercentGdpCompareSelected"></p>
                <div class="country-results compare-results" id="militarySpendingPercentGdpCompareResults" role="listbox" aria-label="Military Spending (% of GDP) comparison country results" hidden></div>
              </div>
            </header>

            <div class="chart-card" id="militarySpendingPercentGdpChartCard">
              <canvas id="militarySpendingPercentGdpChart" aria-label="Military spending percent of GDP line chart" role="img"></canvas>
              <div class="chart-overlay" id="militarySpendingPercentGdpOverlay" aria-hidden="true"></div>
            </div>

            <details class="data-table-toggle" id="militarySpendingPercentGdpTableToggle">
              <summary>Show data table</summary>
              <div class="data-table-wrap" id="militarySpendingPercentGdpTableWrap"></div>
            </details>
          </section>

          <footer class="shared-notes" aria-label="Chart notes">
            <p>Source: SIPRI Military Expenditure Database.</p>
          </footer>
        </div>
      </section>
    </main>
  </body>
</html>

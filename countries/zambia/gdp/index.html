<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zambia GDP</title>
    <link rel="stylesheet" href="../../../styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
    <script type="module" src="../../../src/countryIndicatorPage.js"></script>
  </head>
  <body data-country-code="ZMB" data-page-kind="gdp">
    <header class="site-header">
      <a class="site-home-link" href="../../../">HOME</a>
    </header>
    <main class="page-shell">
      <section class="top-nav-card" aria-label="Site navigation"></section>

      <section class="hub-section" aria-labelledby="country-hub-title">
        <header class="page-header">
          <h1 id="country-hub-title" class="page-title">GDP Chart by Country</h1>
          <p class="subtitle">Select a country to view historical GDP trends.</p>
        </header>

        <div class="country-search-panel">
          <div class="search-input-wrap">
            <input
              id="countrySearchInput"
              class="country-search-input"
              type="search"
              autocomplete="off"
              aria-controls="countrySearchResults"
              role="combobox"
              aria-autocomplete="list"
              aria-expanded="false"
            />
            <div class="country-results" id="countrySearchResults" role="listbox" aria-label="Country search results" hidden></div>
          </div>
        </div>
      </section>

      <section class="indicators-section" aria-labelledby="country-data-title">
        <div class="indicators-card">
          <header class="page-header country-data-header">
            <h1 id="country-data-title">Zambia</h1>
            <nav class="site-nav" id="countryRelatedPageNav" aria-label="Economy page navigation"></nav>
          </header>

          <section class="indicator-block" aria-labelledby="gdp-title">
            <header class="indicator-header">
              <div class="indicator-title-group">
                <h2 id="gdp-title">GDP <span class="indicator-display-unit">USD</span></h2>
              </div>
              <div class="compare-control" data-series-id="gdp">
                <div class="compare-input-wrap">
                  <input
                    id="gdpCompareInput"
                    class="compare-search-input"
                    type="search"
                    autocomplete="off"
                    placeholder="Compare with..."
                    aria-controls="gdpCompareResults"
                    role="combobox"
                    aria-autocomplete="list"
                    aria-expanded="false"
                  />
                </div>
                <p class="compare-selected" id="gdpCompareSelected"></p>
                <div class="country-results compare-results" id="gdpCompareResults" role="listbox" aria-label="GDP comparison country results" hidden></div>
              </div>
            </header>

            <div class="chart-card" id="gdpChartCard">
              <canvas id="gdpChart" aria-label="GDP line chart" role="img"></canvas>
              <div class="chart-overlay" id="gdpOverlay" aria-hidden="true"></div>
            </div>

            <details class="data-table-toggle" id="gdpTableToggle">
              <summary>Show data table</summary>
              <div class="data-table-wrap" id="gdpTableWrap"></div>
            </details>
          </section>

          <section class="indicator-block" aria-labelledby="gdpNational-title">
            <header class="indicator-header">
              <div class="indicator-title-group">
                <h2 id="gdpNational-title">GDP <span class="indicator-display-unit">Local currency</span></h2>
              </div>
            </header>

            <div class="chart-card" id="gdpNationalChartCard">
              <canvas id="gdpNationalChart" aria-label="GDP in national currency line chart" role="img"></canvas>
              <div class="chart-overlay" id="gdpNationalOverlay" aria-hidden="true"></div>
            </div>

            <details class="data-table-toggle" id="gdpNationalTableToggle">
              <summary>Show data table</summary>
              <div class="data-table-wrap" id="gdpNationalTableWrap"></div>
            </details>
          </section>

          <section class="indicator-block" aria-labelledby="realGdp-title">
            <header class="indicator-header">
              <div class="indicator-title-group">
                <h2 id="realGdp-title">Real GDP <span class="indicator-display-unit">Local currency</span></h2>
              </div>
            </header>

            <div class="chart-card" id="realGdpChartCard">
              <canvas id="realGdpChart" aria-label="Real GDP in constant national currency line chart" role="img"></canvas>
              <div class="chart-overlay" id="realGdpOverlay" aria-hidden="true"></div>
            </div>

            <details class="data-table-toggle" id="realGdpTableToggle">
              <summary>Show data table</summary>
              <div class="data-table-wrap" id="realGdpTableWrap"></div>
            </details>
          </section>

          <footer class="shared-notes" aria-label="Chart notes">
            <p>Source: IMF World Economic Outlook.</p>
            <p>Data may include IMF estimates and projections.</p>
          </footer>
        </div>
      </section>
    </main>
  </body>
</html>

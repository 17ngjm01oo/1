<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Togo Government Debt</title>
    <link rel="stylesheet" href="../../../styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
    <script type="module" src="../../../src/countryIndicatorPage.js"></script>
  </head>
  <body data-country-code="TGO" data-page-kind="government-debt">
    <header class="site-header">
      <a class="site-home-link" href="../../../">HOME</a>
    </header>
    <main class="page-shell">
      <section class="top-nav-card" aria-label="Site navigation"></section>

      <section class="hub-section" aria-labelledby="country-hub-title">
        <header class="page-header">
          <h1 id="country-hub-title" class="page-title">Government Debt Chart by Country</h1>
          <p class="subtitle">Select a country to view historical trends.</p>
        </header>

        <div class="country-search-panel">
          <div class="search-input-wrap">
            <input
              id="countrySearchInput"
              class="country-search-input"
              type="search"
              autocomplete="off"
              aria-controls="countrySearchResults"
              role="combobox"
              aria-autocomplete="list"
              aria-expanded="false"
            />
            <div class="country-results" id="countrySearchResults" role="listbox" aria-label="Country search results" hidden></div>
          </div>
        </div>
      </section>

      <section class="indicators-section" aria-labelledby="country-data-title">
        <div class="indicators-card">
          <header class="page-header country-data-header">
            <h1 id="country-data-title">Togo</h1>
            <nav class="site-nav" id="countryRelatedPageNav" aria-label="Finance page navigation"></nav>
          </header>

          <section class="indicator-block" aria-labelledby="governmentGrossDebt-title">
            <header class="indicator-header">
              <div class="indicator-title-group">
                <h2 id="governmentGrossDebt-title">Government Gross Debt (% of GDP)</h2>
              </div>
              <div class="compare-control" data-series-id="governmentGrossDebt">
                <div class="compare-input-wrap">
                  <input
                    id="governmentGrossDebtCompareInput"
                    class="compare-search-input"
                    type="search"
                    autocomplete="off"
                    placeholder="Compare with..."
                    aria-controls="governmentGrossDebtCompareResults"
                    role="combobox"
                    aria-autocomplete="list"
                    aria-expanded="false"
                  />
                </div>
                <p class="compare-selected" id="governmentGrossDebtCompareSelected"></p>
                <div class="country-results compare-results" id="governmentGrossDebtCompareResults" role="listbox" aria-label="Government Gross Debt (% of GDP) comparison country results" hidden></div>
              </div>
            </header>

            <div class="chart-card" id="governmentGrossDebtChartCard">
              <canvas id="governmentGrossDebtChart" aria-label="Government gross debt line chart" role="img"></canvas>
              <div class="chart-overlay" id="governmentGrossDebtOverlay" aria-hidden="true"></div>
            </div>

            <details class="data-table-toggle" id="governmentGrossDebtTableToggle">
              <summary>Show data table</summary>
              <div class="data-table-wrap" id="governmentGrossDebtTableWrap"></div>
            </details>
          </section>

          <section class="indicator-block" aria-labelledby="governmentNetDebt-title">
            <header class="indicator-header">
              <div class="indicator-title-group">
                <h2 id="governmentNetDebt-title">Government Net Debt (% of GDP)</h2>
              </div>
              <div class="compare-control" data-series-id="governmentNetDebt">
                <div class="compare-input-wrap">
                  <input
                    id="governmentNetDebtCompareInput"
                    class="compare-search-input"
                    type="search"
                    autocomplete="off"
                    placeholder="Compare with..."
                    aria-controls="governmentNetDebtCompareResults"
                    role="combobox"
                    aria-autocomplete="list"
                    aria-expanded="false"
                  />
                </div>
                <p class="compare-selected" id="governmentNetDebtCompareSelected"></p>
                <div class="country-results compare-results" id="governmentNetDebtCompareResults" role="listbox" aria-label="Government Net Debt (% of GDP) comparison country results" hidden></div>
              </div>
            </header>

            <div class="chart-card" id="governmentNetDebtChartCard">
              <canvas id="governmentNetDebtChart" aria-label="Government net debt line chart" role="img"></canvas>
              <div class="chart-overlay" id="governmentNetDebtOverlay" aria-hidden="true"></div>
            </div>

            <details class="data-table-toggle" id="governmentNetDebtTableToggle">
              <summary>Show data table</summary>
              <div class="data-table-wrap" id="governmentNetDebtTableWrap"></div>
            </details>
          </section>

          <footer class="shared-notes" aria-label="Chart notes">
            <p>Source: IMF World Economic Outlook.</p>
            <p>Data may include IMF estimates and projections.</p>
          </footer>
        </div>
      </section>
    </main>
  </body>
</html>

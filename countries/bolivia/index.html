<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bolivia</title>
    <link rel="stylesheet" href="../../styles.css" />
    <script type="module" src="../../src/countryOverviewPage.js"></script>
  </head>
  <body data-country-code="BOL" data-root-href="../../">
    <header class="site-header">
      <a class="site-home-link" href="../../">HOME</a>
    </header>
    <main class="page-shell">
      <section class="top-nav-card" aria-label="Site navigation">
        <a class="country-hub-nav-link" href="../../countries/">Countries</a>
        <details class="top-nav-disclosure">
          <summary class="top-nav-label">Rankings</summary>
          <div class="top-nav-group">
            <details class="top-nav-disclosure">
              <summary class="top-nav-label">Economic</summary>
              <nav class="site-nav" id="rankingTopNav"></nav>
            </details>
            <details class="top-nav-disclosure">
              <summary class="top-nav-label">Population</summary>
              <nav class="site-nav" id="populationTopNav"></nav>
            </details>
            <details class="top-nav-disclosure">
              <summary class="top-nav-label">Environmental</summary>
              <nav class="site-nav" id="environmentalTopNav"></nav>
            </details>
            <details class="top-nav-disclosure">
              <summary class="top-nav-label">Trade</summary>
              <nav class="site-nav" id="tradeTopNav"></nav>
            </details>
            <details class="top-nav-disclosure">
              <summary class="top-nav-label">Fiscal</summary>
              <nav class="site-nav" id="fiscalTopNav"></nav>
            </details>
          </div>
        </details>
      </section>

      <section class="indicators-section" aria-labelledby="country-overview-title">
        <div class="indicators-card">
          <header class="page-header country-data-header">
            <h1 id="country-overview-title">Bolivia</h1>
          </header>

          <div class="country-overview-groups" id="countryOverviewGroups" aria-live="polite">
            <p class="ranking-empty">Loading country data...</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>

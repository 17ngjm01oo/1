<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Rankings</title>
    <link rel="stylesheet" href="../styles.css" />
    <script type="module" src="../src/rankingTopNav.js"></script>
  </head>
  <body data-root-href="../" data-page-kind="rankings-hub">
    <header class="site-header">
      <a class="site-home-link" href="../">HOME</a>
    </header>
    <main class="page-shell">
      <section class="top-nav-card" aria-label="Site navigation"></section>

      <section class="hub-section rankings-hub" aria-labelledby="rankings-hub-title">
        <header class="page-header">
          <h1 id="rankings-hub-title" class="page-title">Rankings</h1>

        <div class="rankings-hub-groups">
          <section class="rankings-hub-group" aria-labelledby="economic-rankings-title">

            <nav class="site-nav" id="rankingTopNav" aria-label="Economic rankings"></nav>

          <section class="rankings-hub-group" aria-labelledby="population-rankings-title">

            <nav class="site-nav" id="environmentalTopNav" aria-label="Environmental rankings"></nav>

          <section class="rankings-hub-group" aria-labelledby="trade-rankings-title">
            <h2 id="trade-rankings-title">Trade</h2>
            <nav class="site-nav" id="tradeTopNav" aria-label="Trade rankings"></nav>
          </section>
          <section class="rankings-hub-group" aria-labelledby="fiscal-rankings-title">

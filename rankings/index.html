<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rankings</title>
    <link rel="stylesheet" href="../styles.css" />
    <script type="module" src="../src/rankingTopNav.js"></script>
  </head>
  <body data-root-href="../" data-page-kind="rankings-hub">
    <main class="page-shell">
      <section class="top-nav-card" aria-label="Site navigation"></section>

      <section class="hub-section rankings-hub" aria-label="Rankings">
        <nav class="rankings-jump-nav" aria-label="Filter ranking categories">
          <span class="rankings-jump-label">Filter by:</span>
          <div class="rankings-jump-links">
            <button class="category-button" type="button" data-rankings-hub-category="" aria-pressed="true">All</button>
            <button class="category-button" type="button" data-rankings-hub-category="economy" aria-pressed="false">Economy</button>
            <button class="category-button" type="button" data-rankings-hub-category="population" aria-pressed="false">Population</button>
            <button class="category-button" type="button" data-rankings-hub-category="trade" aria-pressed="false">Trade</button>
            <button class="category-button" type="button" data-rankings-hub-category="finance" aria-pressed="false">Finance</button>
            <button class="category-button" type="button" data-rankings-hub-category="society" aria-pressed="false">Society</button>
            <button class="category-button" type="button" data-rankings-hub-category="environment" aria-pressed="false">Environment</button>
          </div>
        </nav>
        <div class="rankings-hub-groups">
          <section class="rankings-hub-group" data-rankings-hub-group="economy" aria-labelledby="economy-rankings-title">
            <h2 id="economy-rankings-title">Economy</h2>
            <nav class="site-nav" id="economyTopNav" aria-label="Economy rankings"></nav>
          </section>
          <section class="rankings-hub-group" data-rankings-hub-group="population" aria-labelledby="population-rankings-title">
            <h2 id="population-rankings-title">Population</h2>
            <nav class="site-nav" id="populationTopNav" aria-label="Population rankings"></nav>
          </section>
          <section class="rankings-hub-group" data-rankings-hub-group="trade" aria-labelledby="trade-rankings-title">
            <h2 id="trade-rankings-title">Trade</h2>
            <nav class="site-nav" id="tradeTopNav" aria-label="Trade rankings"></nav>
          </section>
          <section class="rankings-hub-group" data-rankings-hub-group="finance" aria-labelledby="finance-rankings-title">
            <h2 id="finance-rankings-title">Finance</h2>
            <nav class="site-nav" id="financeTopNav" aria-label="Finance rankings"></nav>
          </section>
          <section class="rankings-hub-group" data-rankings-hub-group="society" aria-labelledby="society-rankings-title">
            <h2 id="society-rankings-title">Society</h2>
            <nav class="site-nav" id="societyTopNav" aria-label="Society rankings"></nav>
          </section>
          <section class="rankings-hub-group" data-rankings-hub-group="environment" aria-labelledby="environment-rankings-title">
            <h2 id="environment-rankings-title">Environment</h2>
            <nav class="site-nav" id="environmentTopNav" aria-label="Environment rankings"></nav>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>

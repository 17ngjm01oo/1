<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./src/rankingTopNav.js"></script>
  </head>
  <body data-root-href="./" data-page-kind="home">
    <main class="page-shell">
      <section class="home-entry-cards" aria-label="Explore site sections">
        <a class="home-entry-card home-entry-card-countries" href="./countries/">
          <span class="home-entry-icon" aria-hidden="true">
            <svg class="home-entry-visual globe-visual" viewBox="0 0 140 140" focusable="false">
              <circle class="visual-orbit" cx="70" cy="70" r="42"></circle>
              <ellipse class="visual-grid" cx="70" cy="70" rx="20" ry="42"></ellipse>
              <path class="visual-grid" d="M28 70h84M34 51c22 10 50 10 72 0M34 89c22-10 50-10 72 0"></path>
            </svg>
          </span>
          <span class="home-entry-copy">
            <span class="home-entry-title">Countries</span>
            <span class="home-entry-description">Country and territory data with indicators and charts.</span>
            <span class="home-entry-action">Explore countries <span aria-hidden="true">&rarr;</span></span>
          </span>
        </a>

        <a class="home-entry-card home-entry-card-rankings" href="./rankings/">
          <span class="home-entry-icon" aria-hidden="true">
            <svg class="home-entry-visual ranking-visual" viewBox="0 0 140 140" focusable="false">
              <path class="visual-axis" d="M29 104h84"></path>
              <rect class="visual-bar visual-bar-low" x="38" y="73" width="14" height="31" rx="2"></rect>
              <rect class="visual-bar visual-bar-mid" x="63" y="57" width="14" height="47" rx="2"></rect>
              <rect class="visual-bar visual-bar-high" x="88" y="38" width="14" height="66" rx="2"></rect>
              <path class="visual-trend" d="M35 65l26-19 18 7 27-29"></path>
              <circle class="visual-trend-node" cx="35" cy="65" r="3"></circle>
              <circle class="visual-trend-node" cx="61" cy="46" r="3"></circle>
              <circle class="visual-trend-node" cx="79" cy="53" r="3"></circle>
              <circle class="visual-trend-node" cx="106" cy="24" r="3"></circle>
            </svg>
          </span>
          <span class="home-entry-copy">
            <span class="home-entry-title">Rankings</span>
            <span class="home-entry-description">Compare countries and territories with searchable global ranking tables.</span>
            <span class="home-entry-action">View rankings <span aria-hidden="true">&rarr;</span></span>
          </span>
        </a>
      </section>
    </main>
  </body>
</html>
